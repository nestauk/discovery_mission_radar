missions:
  ASF:
    hansard: |
      Mark 'yes' only if the speech explicitly mentions the configured category in the correct sense (energy technology/solution)
      AND there is at least one immediate contextual cue (in this speech or the adjacent ones) showing a real connection, such as:
      - A concrete example, measure, deployment, barrier, evidence, funding, regulation, implementation or performance point
      - A comparison, trade‑off, target, or plan explicitly tied to the category

      Mark 'no' if any of the following:
      - The term appears only in passing, in lists, rhetorical flourishes, or unrelated contexts
      - The usage is a different meaning/sense of the word than the configured category
      - The speech is about generic energy policy without a clear link to the category
      - Content better fits another configured category
      Default to 'no' if uncertain or ambiguous.
