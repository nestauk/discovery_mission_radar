        - "protein rich"
        - "alternative protein"
        - "high fibre"
        - "keto"
        - "ketogenic"
        - "plant-based"
        - "plant-based diet"
        - "vegan"
        - "healthy food"
        - "healthy snack"
        - "functional food"

    - set_name: "Meal Replacement & Product Formats"
