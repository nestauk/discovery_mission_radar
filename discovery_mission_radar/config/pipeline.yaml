# Mission Radar Pipeline Configuration
# This file controls the overall pipeline execution settings


# Date range configuration
date_ranges:
  # Data fetching ranges
  data_start_date: "2014-01-01"
  data_end_date: "2025-06-30"
  
  # Analysis ranges
  yearly_analysis:
    start_year: 2014
    end_year: 2025
    
  quarterly_analysis:
    start_quarter: "2023-Q1"
    end_quarter: "2025-Q2"
    
  # Growth analysis
  growth_analysis:
    base_year: 2020
    comparison_year: 2024
    
current_period:
  quarter: "2025-Q2"
  year: 2025

data_sources:
  crunchbase:
    enabled: true
    run_llm_check: true
    excluded_topics:
      ASF: [    
        "bioenergy",
        "built_environment",
        "decarbonisation_general",
        "energy_efficiency",
        "energy_grid",
        "energy_storage",
        "green_skills",
        "solar",
        "wind"
        ]
      AHL: [
        "alt_protein_general",
        "plant_based",
        "cloud_kitchen",
        "delivery_apps",
        "fermentation",
        "food_advertisement",
        "food_tech_general",
        "health_general",
        "insects",
        "kitchen_tech",
        "lab_meat",
        "meal_kits",
        "personalised_nutrition",
        "restaurants",
        "retail",
        "supply_chain",
        #"weight_loss_drugs",
        "weight"
      ]
    # Native categories use Crunchbase's native category tags instead of custom topic configs
    native_categories:
      ASF:
        energy_storage: "Battery"
        renewables_general: "Renewable Energy"
        solar: "Solar"
        wind: "Wind Energy"
      AHL: {}
    
  gtr:
    enabled: true
    run_llm_check: true
    excluded_topics:
      ASF: [
        "bioenergy",
        "built_environment",
        "energy_grid",
        "green_skills",
        "renewables_general",    
        "decarbonisation_general",    
      ]
      AHL: [
        "alt_protein_general",
        "plant_based",
        "cloud_kitchen",
        "delivery_apps",
        "fermentation",
        "food_advertisement",
        "food_tech_general",
        "health_general",
        "insects",
        "kitchen_tech",
        "lab_meat",
        "meal_kits",
        "personalised_nutrition",
        "restaurants",
        "retail",
        "supply_chain",
        #"weight_loss_drugs",
        "weight"
      ]
    
  hansard:
    enabled: true
    run_llm_check: false  # Use pre-existing topic labels by default
    excluded_topics:
      ASF: [
        "renewables_general",    
        "decarbonisation_general",   
      ]
      AHL: [
        "alt_protein_general",
        "plant_based",
        "cloud_kitchen",
        "delivery_apps",
        "fermentation",
        "food_advertisement",
        "food_tech_general",
        "health_general",
        "insects",
        "kitchen_tech",
        "lab_meat",
        "meal_kits",
        "personalised_nutrition",
        "restaurants",
        "retail",
        "supply_chain",
        #"weight_loss_drugs",
        "weight"
      ]

# Categories for cross-topic radar charts
categories_to_show:
  ASF:
    - "heat_pumps"
    - "biomass_heating" 
    - "district_heating"
    - "wind"
    - "solar"
    - "hydrogen_energy"
    - "energy_efficiency"
    - "ccus"
  AHL:
    - "reformulation_fiber"
    - "reformulation_salt"
    - "reformulation_fat"
    - "reformulation_general"
    - "reformulation_sugar"
    #- "food_advertisement"
    - "weight_loss_drugs"

# Output settings  
output:
  base_dir: "./outputs"
  cache_enabled: true
  cache_ttl_hours: 48
  
  # Google Sheets integration
  google_sheets:
    enabled: true
    ahl_sheet_id: "19LezmfR4azwXmtepI_ASTgu7MYr2-sdPgp_8pGv-JaM"
    asf_sheet_id: "kmHGOcNzBBtO3aZnRsmELic35rD4XetExS0eJASH1fQ"
    upload_aggregated_data: true

# Execution settings
execution:
  log_level: "INFO"
  fail_fast: true  # Stop on first error